<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>QR meniu intrare — Casuta dintre brazi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #c41e3a;
      --red-dark: #9a1830;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f9fafb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Nunito", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: 1.5rem;
    }

    .page {
      max-width: 520px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 0.35rem;
      font-size: 1.6rem;
      color: var(--red-dark);
    }

    .intro {
      margin: 0 0 1.5rem;
      color: var(--muted);
      font-weight: 600;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .btn--primary {
      background: var(--red);
      color: #fff;
    }

    .btn--ghost {
      background: #fff;
      color: var(--red-dark);
      border: 2px solid var(--border);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .qr-card {
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
    }

    .qr-card__title {
      margin: 0 0 0.35rem;
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--red-dark);
    }

    .qr-card__hint {
      margin: 0 0 1rem;
      color: var(--muted);
      font-weight: 600;
      font-size: 0.92rem;
    }

    .qr-card img {
      width: 220px;
      height: 220px;
      display: block;
      margin: 0 auto 1rem;
    }

    .qr-card__link {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      word-break: break-all;
      font-weight: 600;
    }

    @media print {
      body {
        background: #fff;
        padding: 0.5rem;
      }

      .actions,
      .intro {
        display: none;
      }

      .qr-card {
        border-color: #ccc;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>QR meniu — intrare</h1>
    <p class="intro">
      Printează acest cod și pune-l la intrare sau în vitrină.
      Clienții scanează și văd meniul, fără posibilitate de comandă online.
      Pentru comenzi la masă folosește QR-urile de la <strong>qr-mese.html</strong>.
    </p>

    <div class="actions">
      <button type="button" class="btn btn--primary" onclick="window.print()">Printează</button>
      <a href="meniu.html" class="btn btn--ghost" target="_blank" rel="noopener">Deschide meniul</a>
      <a href="index.html" class="btn btn--ghost">Meniu cu comandă</a>
      <a href="qr-mese.html" class="btn btn--ghost">QR mese</a>
    </div>

    <article class="qr-card" id="qr-card"></article>
  </div>

  <script>
    (function () {
      var card = document.getElementById("qr-card");
      var menuUrl = new URL("meniu.html", window.location.href).toString();
      var qrSrc =
        "https://api.qrserver.com/v1/create-qr-code/?size=280x280&margin=12&data=" +
        encodeURIComponent(menuUrl);

      card.innerHTML =
        '<h2 class="qr-card__title">Scanează meniul</h2>' +
        '<p class="qr-card__hint">Casuta dintre brazi</p>' +
        '<img src="' +
        qrSrc +
        '" alt="QR meniu Casuta dintre brazi" width="220" height="220">' +
        '<span class="qr-card__link">' +
        menuUrl +
        "</span>";
    })();
  </script>
</body>
</html>
