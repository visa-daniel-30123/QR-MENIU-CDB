name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generează config.js (parolă admin) din GitHub Secrets
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -z "$ADMIN_PASSWORD" ]; then
            echo "::warning::Lipsește ADMIN_PASSWORD — panoul admin nu va funcționa până adaugi secretul."
          fi
          cat > config.js << EOF
          export const ADMIN_PASSWORD = "${ADMIN_PASSWORD}";
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deploy
